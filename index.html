<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谷雨美妆 - 全站推广数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1f1f1f}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:16px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:20px;font-weight:600;margin-bottom:8px}
.header-info{display:flex;gap:16px;font-size:13px;opacity:.9;flex-wrap:wrap;align-items:center}
.upload-area{background:rgba(255,255,255,.15);border:2px dashed rgba(255,255,255,.5);border-radius:8px;padding:10px 20px;cursor:pointer;text-align:center;transition:all .3s;margin-left:auto;min-width:200px;font-size:13px}
.upload-area:hover{background:rgba(255,255,255,.25);border-color:#fff}
.upload-area input{display:none}
.container{max-width:1400px;margin:0 auto;padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-card .label{font-size:13px;color:#8c8c8c;margin-bottom:8px}
.kpi-card .value{font-size:28px;font-weight:700;color:#1f1f1f}
.kpi-card .sub{font-size:12px;color:#8c8c8c;margin-top:4px}
.threshold-setting{display:flex;align-items:center;gap:8px;font-size:13px;color:#595959;background:#fff;padding:10px 16px;border-radius:8px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-wrap:wrap}
.threshold-setting label{font-weight:500}
.threshold-input{width:80px;padding:4px 8px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;text-align:center;outline:none}
.threshold-input:focus{border-color:#667eea;box-shadow:0 0 0 2px rgba(102,126,234,.2)}
.threshold-hint{font-size:12px;color:#8c8c8c}
#shopFilter{display:none;align-items:center;gap:8px;margin-left:auto}
#shopSelect{padding:4px 8px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;outline:none}
.alert-banner{background:linear-gradient(135deg,#fff1f0,#ffccc7);border:2px solid #ff4d4f;border-radius:12px;padding:20px;margin-bottom:20px;display:none}
.alert-banner.active{display:block}
.alert-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;color:#cf1322;font-weight:600;font-size:16px}
.alert-header svg{width:20px;height:20px;fill:#cf1322}
.alert-list{max-height:300px;overflow-y:auto}
.alert-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:#fff;border-radius:8px;margin-bottom:8px;font-size:13px}
.alert-item img{width:40px;height:40px;border-radius:6px;object-fit:cover;background:#f5f5f5}
.alert-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-item .cost-info{text-align:right;color:#8c8c8c;font-size:12px}
.alert-item .pct{color:#cf1322;font-weight:700;font-size:14px}
.chart-section{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#1f1f1f}
#trendChart{width:100%;height:400px}
.table-section{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.search-box{width:100%;padding:10px 16px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;margin-bottom:16px;outline:none}
.search-box:focus{border-color:#667eea;box-shadow:0 0 0 2px rgba(102,126,234,.2)}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-tab{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #d9d9d9;background:#fff;transition:all .2s}
.filter-tab.active{background:#667eea;color:#fff;border-color:#667eea}
.table-header{display:flex;align-items:center;gap:12px;padding:8px 12px;border-bottom:2px solid #e8e8e8;font-weight:600;color:#8c8c8c;font-size:12px}
.product-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .2s;font-size:14px}
.product-row:hover{background:#fafafa}
.product-row.expanded{background:#f6f8ff}
.product-img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:#f5f5f5;flex-shrink:0}
.product-name{flex:1;min-width:200px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-stat{text-align:center;padding:0 12px;min-width:100px}
.product-stat .num{font-weight:700;color:#1f1f1f}
.product-stat .lbl{font-size:11px;color:#8c8c8c;margin-top:2px}
.expand-area{display:none;padding:12px 20px;background:#f6f8ff}
.expand-area.show{display:block}
.expand-area .chart-container{width:100%;height:250px}
.expand-tabs{display:flex;gap:8px;margin-bottom:8px}
.expand-tab{padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #d9d9d9;background:#fff}
.expand-tab.active{background:#667eea;color:#fff;border-color:#667eea}
.daily-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.daily-table th{background:#fafafa;padding:8px 12px;text-align:center;font-weight:600;color:#8c8c8c;border-bottom:2px solid #e8e8e8}
.daily-table td{padding:6px 12px;text-align:center;border-bottom:1px solid #f0f0f0}
.daily-table tr:hover td{background:#fff}
.cost-down{color:#ff4d4f;font-weight:600}
.cost-up{color:#52c41a;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-red{background:#fff1f0;color:#cf1322}
.hidden{display:none}
#fileInput{display:none}
</style>
</head>
<body>

<div class="header">
<div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
<h1>谷雨美妆护肤旗舰店 - 全站推广数据看板</h1>
<div class="header-info">
<span id="dateRange">数据加载中...</span>
<span id="metaInfo"></span>
</div>
<div class="upload-area" id="uploadBtn">
&#x1F4C1; 上传新数据 (Excel)
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
</div>
</div>
</div>

<div class="container">
<div class="threshold-setting">
  <label>预警阈值：</label>
  <span>消耗环比降幅</span>
  <span>&gt;</span>
  <input type="number" class="threshold-input" id="thresholdInput" value="20" min="0" max="100" step="5">
  <span>%</span>
  <span class="threshold-hint">（调整后实时更新）</span>
  <div id="shopFilter">
    <label>店铺：</label>
    <select id="shopSelect"></select>
  </div>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="alert-banner" id="alertBanner">
<div class="alert-header">
<svg viewBox="0 0 1024 1024"><path d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64zm0 820c-205.4 0-372-166.6-372-372s166.6-372 372-372 372 166.6 372 372-166.6 372-372 372z"/><path d="M464 688a48 48 0 1 0 96 0 48 48 0 1 0-96 0zm24-112h48c4.4 0 8-3.6 8-8V360c0-4.4-3.6-8-8-8h-48c-4.4 0-8 3.6-8 8v208c0 4.4 3.6 8 8 8z"/></svg>
<span id="alertTitle">消耗环比预警</span>
</div>
<div class="alert-list" id="alertList"></div>
</div>

<div class="chart-section">
<div class="chart-title">每日花费 &amp; ROI 趋势</div>
<div id="trendChart"></div>
</div>

<div class="table-section">
<div class="chart-title">商品明细</div>
<div class="filter-tabs" id="filterTabs">
<div class="filter-tab active" data-filter="all">全部</div>
<div class="filter-tab" data-filter="alert">有预警</div>
<div class="filter-tab" data-filter="top">花费Top 20</div>
</div>
<input class="search-box" id="searchBox" type="text" placeholder="搜索商品名称...">
<div class="table-header">
<span style="width:48px"></span>
<span style="flex:1">商品名称</span>
<span class="product-stat"><div class="num">商品ID</div></span>
<span class="product-stat"><div class="num">总花费</div></span>
<span class="product-stat"><div class="num">总GMV</div></span>
<span class="product-stat"><div class="num">ROI</div></span>
<span class="product-stat"><div class="num">环比昨日消耗</div></span>
</div>
<div id="productList"></div>
</div>
</div>

<script>
// 内置数据
const BUILT_IN_DATA = {"meta": {"date_range": "", "total_cost": 0, "total_gmv": 0, "total_roi": 0, "num_products": 0, "num_days": 0, "latest_date": "", "prev_date": "", "shop_name": "全部店铺", "generated_at": "2026-05-29 11:45:21"}, "alerts": [], "daily_summary": [], "product_summary": [], "all_product_daily": {}, "allShops": true};
const ALL_SHOP_DATA = {};

let chartData = null;
let trendChart = null;
let expandedProduct = null;
let productCharts = {};
let allShopData = {};
let currentShop = 'all';
let alertThreshold = 20;
let currentFilter = 'all';
let currentSearch = '';

function loadData(data) {
  chartData = data;
  currentShop = 'all';
  renderShopFilter();
  renderKPIs();
  renderAlerts();
  renderTrendChart();
  renderProductList();
}

function getFilteredAlerts() {
  if (!chartData || !chartData.alerts) return [];
  return chartData.alerts.filter(a => a.change_pct < -alertThreshold);
}

function renderKPIs() {
  const m = chartData.meta;
  document.getElementById('dateRange').textContent = '数据周期：' + m.date_range;
  document.getElementById('metaInfo').textContent = m.num_products + ' 个商品 \u00B7 ' + m.num_days + ' 天';
  const alertCount = getFilteredAlerts().length;
  const kpis = [
    { label: '总花费', value: '\u00A5' + formatNum(m.total_cost), sub: '占比 100%', color: '#667eea' },
    { label: '总GMV', value: '\u00A5' + formatNum(m.total_gmv), sub: '全站', color: '#36cfc9' },
    { label: '整体ROI', value: m.total_roi, sub: 'GMV / 花费', color: '#52c41a' },
    { label: '商品数', value: m.num_products, sub: m.num_days + ' 天数据', color: '#faad14' },
    { label: '预警商品', value: alertCount, sub: '环比降幅>' + alertThreshold + '%', color: alertCount > 0 ? '#ff4d4f' : '#52c41a' }
  ];
  document.getElementById('kpiGrid').innerHTML = kpis.map(k =>
    '<div class="kpi-card" style="border-top:3px solid ' + k.color + '">' +
    '<div class="label">' + k.label + '</div>' +
    '<div class="value" style="color:' + k.color + '">' + k.value + '</div>' +
    '<div class="sub">' + k.sub + '</div></div>'
  ).join('');
}

function renderAlerts() {
  const alerts = getFilteredAlerts();
  const banner = document.getElementById('alertBanner');
  const list = document.getElementById('alertList');
  document.getElementById('alertTitle').textContent = '消耗环比预警（最新日 vs 前一日 降幅 > ' + alertThreshold + '%）';
  if (alerts.length === 0) { banner.classList.remove('active'); return; }
  banner.classList.add('active');
  list.innerHTML = alerts.slice(0, 50).map(a =>
    '<div class="alert-item">' +
    '<img src="' + a.product_img + '" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2230%22>图</text></svg>\'">' +
    '<div class="name" title="' + escHtml(a.product_name) + '">' + escHtml(a.product_name) + '</div>' +
    '<div class="cost-info"><div>花费 ' + a.current_cost + ' 元 (前日 ' + a.prev_cost + ' 元)</div>' +
    '<div class="pct">' + (a.change_pct > 0 ? '+' : '') + a.change_pct + '%</div></div></div>'
  ).join('');
}

function renderTrendChart() {
  if (trendChart) trendChart.dispose();
  trendChart = echarts.init(document.getElementById('trendChart'));
  const ds = chartData.daily_summary.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  trendChart.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
    legend: { data: ['每日花费', '每日ROI'], top: 0 },
    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
    xAxis: { type: 'category', data: ds.map(d => d.date), axisLabel: { rotate: 45 } },
    yAxis: [
      { type: 'value', name: '花费 (元)', position: 'left', axisLabel: { formatter: v => v >= 1000 ? (v/1000).toFixed(0) + 'k' : v } },
      { type: 'value', name: 'ROI', position: 'right', splitLine: { show: false } }
    ],
    series: [
      { name: '每日花费', type: 'bar', data: ds.map(d => d.cost), itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#667eea' }, { offset: 1, color: '#764ba2' }]) } },
      { name: '每日ROI', type: 'line', data: ds.map(d => d.roi), yAxisIndex: 1, smooth: true, itemStyle: { color: '#52c41a' }, lineStyle: { width: 3 } }
    ],
    dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', start: 0, end: 100 }]
  });
}

function renderProductList() {
  var products = (chartData.product_summary || []).filter(p => p.total_cost > 0);
  var alertIds = new Set(getFilteredAlerts().map(a => a.product_id));
  var latestDate = chartData.meta.latest_date || '';
  var prevDate = chartData.meta.prev_date || '';
  
  // Build a map of product_id -> { latest_cost, prev_cost, change_pct }
  var changeMap = {};
  if (chartData.all_product_daily) {
    Object.keys(chartData.all_product_daily).forEach(function(pid) {
      var daily = chartData.all_product_daily[pid] || [];
      var latest = daily.find(d => d.date === latestDate);
      var prev = daily.find(d => d.date === prevDate);
      if (latest && prev && prev.cost > 0) {
        var pct = (latest.cost - prev.cost) / prev.cost * 100;
        changeMap[pid] = { latest_cost: latest.cost, prev_cost: prev.cost, change_pct: pct };
      } else if (latest && prev && prev.cost === 0 && latest.cost > 0) {
        changeMap[pid] = { latest_cost: latest.cost, prev_cost: 0, change_pct: null, is_new: true };
      } else if (latest && !prev) {
        changeMap[pid] = { latest_cost: latest.cost, prev_cost: 0, change_pct: null, is_new: true };
      } else if (!latest && prev) {
        changeMap[pid] = { latest_cost: 0, prev_cost: prev.cost, change_pct: -100 };
      }
    });
  }
  
  let filtered = products;
  if (currentFilter === 'alert') filtered = products.filter(p => alertIds.has(p.product_id));
  else if (currentFilter === 'top') filtered = products.slice(0, 20);
  if (currentSearch) { const s = currentSearch.toLowerCase(); filtered = filtered.filter(p => p.product_name.toLowerCase().includes(s)); }

  const container = document.getElementById('productList');
  if (filtered.length === 0) { container.innerHTML = '<div style="padding:40px;text-align:center;color:#8c8c8c">暂无匹配商品</div>'; return; }

  container.innerHTML = filtered.map(p => {
    const isAlert = alertIds.has(p.product_id);
    const isExpanded = expandedProduct === p.product_id;
    const change = changeMap[p.product_id];
    let changeHtml = '-';
    if (change) {
      if (change.is_new) {
        changeHtml = '<span style="color:#52c41a;font-weight:600">新增</span>';
      } else if (change.change_pct === -100) {
        changeHtml = '<span class="cost-down">\u2193 100%</span>';
      } else if (change.change_pct !== null) {
        const cls = change.change_pct < 0 ? 'cost-down' : 'cost-up';
        const arrow = change.change_pct < 0 ? '\u2193' : '\u2191';
        changeHtml = '<span class="' + cls + '">' + arrow + ' ' + Math.abs(change.change_pct).toFixed(1) + '%</span>';
      }
    }
    
    return '<div>' +
      '<div class="product-row ' + (isExpanded ? 'expanded' : '') + '" onclick="toggleProduct(\'' + p.product_id + '\')">' +
      '<img class="product-img" src="' + p.product_img + '" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2230%22>图</text></svg>\'">' +
      '<div class="product-name" title="' + escHtml(p.product_name) + '">' + escHtml(p.product_name) + (isAlert ? ' <span class="badge badge-red">预警</span>' : '') + '</div>' +
      '<div class="product-stat"><div class="num" style="font-size:12px">' + p.product_id + '</div><div class="lbl">商品ID</div></div>' +
      '<div class="product-stat"><div class="num">' + formatNum(p.total_cost) + '</div><div class="lbl">总花费</div></div>' +
      '<div class="product-stat"><div class="num">' + formatNum(p.total_gmv) + '</div><div class="lbl">总GMV</div></div>' +
      '<div class="product-stat"><div class="num">' + p.roi + '</div><div class="lbl">ROI</div></div>' +
      '<div class="product-stat"><div class="num">' + changeHtml + '</div><div class="lbl">vs 昨日</div></div></div>' +
      '<div class="expand-area ' + (isExpanded ? 'show' : '') + '" id="expand-' + p.product_id + '">' +
      '<div class="expand-tabs">' +
      '<div class="expand-tab ' + (isExpanded ? 'active' : '') + '" onclick="switchExpandTab(\'' + p.product_id + '\',\'chart\',event)">趋势图</div>' +
      '<div class="expand-tab" onclick="switchExpandTab(\'' + p.product_id + '\',\'table\',event)">分日数据</div></div>' +
      '<div id="chart-view-' + p.product_id + '" class="chart-container" style="width:100%;height:250px;' + (isExpanded ? '' : 'display:none') + '"></div>' +
      '<div id="table-view-' + p.product_id + '" style="display:none"><table class="daily-table"><thead><tr><th>日期</th><th>消耗(元)</th><th>GMV(元)</th><th>ROI</th><th>环比消耗</th></tr></thead><tbody></tbody></table></div></div></div>';
  }).join('');

  if (expandedProduct && chartData.all_product_daily && chartData.all_product_daily[expandedProduct]) {
    setTimeout(function(){ renderProductChart(expandedProduct); }, 100);
  }
}

function renderProductChart(pid) {
  const container = document.getElementById('chart-view-' + pid);
  if (!container) return;
  if (productCharts[pid]) productCharts[pid].dispose();
  const ch = echarts.init(container);
  productCharts[pid] = ch;
  const daily = (chartData.all_product_daily[pid] || []).slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  ch.setOption({
    title: { text: '商品每日消耗 & ROI 趋势', left: 'center', textStyle: { fontSize: 14 } },
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        var res = params[0].axisValue + '<br/>';
        params.forEach(function(p) {
          var val = typeof p.value === 'number' ? p.value.toFixed(2) : p.value;
          res += p.marker + p.seriesName + ': ' + val + '<br/>';
        });
        return res;
      }
    },
    legend: { data: ['消耗', 'ROI'], bottom: 0 },
    grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
    xAxis: { type: 'category', data: daily.map(d => d.date), axisLabel: { rotate: 45 } },
    yAxis: [
      { type: 'value', name: '消耗(元)' },
      { type: 'value', name: 'ROI', splitLine: { show: false } }
    ],
    series: [
      { name: '消耗', type: 'bar', data: daily.map(d => d.cost), itemStyle: { color: '#667eea' } },
      { name: 'ROI', type: 'line', data: daily.map(d => d.roi), yAxisIndex: 1, smooth: true, itemStyle: { color: '#52c41a' } }
    ]
  });
}

function renderProductDailyTable(pid) {
  const tbody = document.querySelector('#table-view-' + pid + ' tbody');
  if (!tbody) return;
  const daily = (chartData.all_product_daily[pid] || []).slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  let rows = '';
  daily.forEach(function(d, idx) {
    let changeHtml = '-';
    if (idx > 0 && daily[idx-1].cost > 0) {
      const changePct = (d.cost - daily[idx-1].cost) / daily[idx-1].cost * 100;
      const cls = changePct < 0 ? 'cost-down' : 'cost-up';
      const arrow = changePct < 0 ? '\u2193' : '\u2191';
      changeHtml = '<span class="' + cls + '">' + arrow + ' ' + Math.abs(changePct).toFixed(1) + '%</span>';
    }
    rows += '<tr><td>' + d.date + '</td><td>' + d.cost.toFixed(2) + '</td><td>' + d.gmv.toFixed(2) + '</td><td>' + d.roi.toFixed(2) + '</td><td>' + changeHtml + '</td></tr>';
  });
  tbody.innerHTML = rows;
}

function switchExpandTab(pid, tab, event) {
  if (event) {
    event.target.parentElement.querySelectorAll('.expand-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
  }
  var cv = document.getElementById('chart-view-' + pid);
  var tv = document.getElementById('table-view-' + pid);
  if (tab === 'chart') {
    cv.style.display = 'block'; tv.style.display = 'none';
    renderProductChart(pid);
  } else {
    cv.style.display = 'none'; tv.style.display = 'block';
    renderProductDailyTable(pid);
  }
}

function toggleProduct(pid) {
  expandedProduct = (expandedProduct === pid) ? null : pid;
  renderProductList();
}

function renderShopFilter() {
  var container = document.getElementById('shopFilter');
  var select = document.getElementById('shopSelect');
  var shopNames = Object.keys(allShopData);
  if (shopNames.length <= 1) { container.style.display = 'none'; return; }
  container.style.display = 'flex';
  select.innerHTML = '<option value="all">全部店铺</option>' + shopNames.map(n => '<option value="' + n + '">' + n + '</option>').join('');
  select.value = currentShop;
}

function applyShopFilter() {
  if (currentShop === 'all') {
    var merged = mergeShopData(allShopData);
    merged.allShops = true;
    chartData = merged;
  } else if (allShopData[currentShop]) {
    chartData = JSON.parse(JSON.stringify(allShopData[currentShop]));
  }
  renderKPIs();
  renderAlerts();
  renderTrendChart();
  renderProductList();
}

function mergeShopData(shops) {
  var merged = { meta: { date_range: '', total_cost: 0, total_gmv: 0, total_roi: 0, num_products: 0, num_days: 0, latest_date: '', prev_date: '', shop_name: '全部店铺' }, alerts: [], daily_summary: [], product_summary: [], all_product_daily: {} };
  var allDates = new Set(), allProducts = {}, dailyMap = {};
  Object.keys(shops).forEach(function(shopName) {
    var data = shops[shopName];
    merged.alerts = merged.alerts.concat(data.alerts.map(a => Object.assign({}, a, { shop_name: shopName })));
    data.product_summary.forEach(p => { if (!allProducts[p.product_id]) allProducts[p.product_id] = Object.assign({}, p); else { allProducts[p.product_id].total_cost = round(allProducts[p.product_id].total_cost + p.total_cost); allProducts[p.product_id].total_gmv = round(allProducts[p.product_id].total_gmv + p.total_gmv); }});
    data.daily_summary.forEach(d => { allDates.add(d.date); if (!dailyMap[d.date]) dailyMap[d.date] = { date: d.date, cost: 0, gmv: 0 }; dailyMap[d.date].cost = round(dailyMap[d.date].cost + d.cost); dailyMap[d.date].gmv = round(dailyMap[d.date].gmv + d.gmv); });
    Object.keys(data.all_product_daily).forEach(pid => {
      if (!merged.all_product_daily[pid]) merged.all_product_daily[pid] = [];
      data.all_product_daily[pid].forEach(d => { var ex = merged.all_product_daily[pid].find(x => x.date === d.date); if (ex) { ex.cost = round(ex.cost + d.cost); ex.gmv = round(ex.gmv + d.gmv); } else merged.all_product_daily[pid].push({ date: d.date, cost: round(d.cost), gmv: round(d.gmv), roi: 0 }); });
    });
  });
  var sortedDates = Array.from(allDates).sort();
  merged.meta.date_range = sortedDates.length ? sortedDates[0] + ' ~ ' + sortedDates[sortedDates.length-1] : '';
  merged.meta.total_cost = round(Object.values(dailyMap).reduce((s,d) => s+d.cost, 0));
  merged.meta.total_gmv = round(Object.values(dailyMap).reduce((s,d) => s+d.gmv, 0));
  merged.meta.total_roi = merged.meta.total_cost > 0 ? round(merged.meta.total_gmv / merged.meta.total_cost) : 0;
  merged.meta.num_products = Object.keys(allProducts).length;
  merged.meta.num_days = sortedDates.length;
  merged.meta.latest_date = sortedDates[sortedDates.length-1] || '';
  merged.meta.prev_date = sortedDates[sortedDates.length-2] || '';
  merged.daily_summary = Object.values(dailyMap).sort((a,b) => a.date.localeCompare(b.date)).map(d => ({ date: d.date, cost: round(d.cost), gmv: round(d.gmv), roi: d.cost > 0 ? round(d.gmv/d.cost) : 0 }));
  merged.product_summary = Object.values(allProducts).map(p => ({ ...p, total_cost: round(p.total_cost), total_gmv: round(p.total_gmv), roi: p.total_cost > 0 ? round(p.total_gmv/p.total_cost) : 0 })).sort((a,b) => b.total_cost - a.total_cost);
  Object.values(merged.all_product_daily).forEach(daily => daily.forEach(d => { d.cost = round(d.cost); d.gmv = round(d.gmv); d.roi = d.cost > 0 ? round(d.gmv/d.cost) : 0; }));
  merged.alerts.sort((a,b) => a.change_pct - b.change_pct);
  return merged;
}

function formatNum(n) { if (n >= 10000) return (n/10000).toFixed(2) + '万'; if (n >= 1000) return n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ','); return n.toFixed(2); }
function round(n) { return parseFloat(n.toFixed(2)); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 事件绑定
document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      const sheetsData = wb.SheetNames.map(sn => ({ sheetName: sn, rows: XLSX.utils.sheet_to_json(wb.Sheets[sn]) })).filter(s => s.rows.length > 0);
      parseMultiShopData(sheetsData);
      alert('数据已更新：' + file.name);
    } catch(err) { alert('解析失败：' + err.message); }
  };
  reader.readAsArrayBuffer(file); this.value = '';
});

document.getElementById('searchBox').addEventListener('input', function() { currentSearch = this.value.trim(); renderProductList(); });
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active'); currentFilter = this.dataset.filter; renderProductList();
  });
});
document.getElementById('thresholdInput').addEventListener('input', function() { alertThreshold = parseFloat(this.value) || 20; renderKPIs(); renderAlerts(); renderProductList(); });
document.getElementById('shopSelect').addEventListener('change', function() { currentShop = this.value; applyShopFilter(); });
window.addEventListener('resize', () => { if (trendChart) trendChart.resize(); Object.values(productCharts).forEach(ch => { if(ch) ch.resize(); }); });

function parseDate(d) { if (!d) return ''; if (d instanceof Date) return d.toISOString().split('T')[0]; const s = String(d); const m = s.match(/(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/); return m ? m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0') : s.substring(0,10); }

function parseMultiShopData(sheetsData) {
  allShopData = {};
  sheetsData.forEach(({ sheetName, rows }) => {
    var sd = parseShopData(rows, sheetName);
    if (sd) allShopData[sheetName] = sd;
  });
  var names = Object.keys(allShopData);
  if (names.length === 1) loadData(allShopData[names[0]]);
  else if (names.length > 1) loadData(mergeShopData(allShopData));
}

function parseShopData(rows, shopName) {
  if (rows.length === 0) return null;
  var keys = Object.keys(rows[0]);
  function findCol(kw) { for (var k of kw) for (var key of keys) if (key.includes(k)) return key; return null; }
  var cm = { date: findCol(['时间','日期','time']), cost: findCol(['花费','消耗','cost','spend']), gmv: findCol(['全站GMV','GMV']), roi: findCol(['全站ROI','ROI']), pid: findCol(['商品id','product_id','商品ID']), pname: findCol(['商品名称','product_name']), pimg: findCol(['商品主图','product_img','主图','图片']) };
  if (!cm.date || !cm.cost || !cm.pid) return null;

  var cleaned = rows.map(r => ({ pid: r[cm.pid]||'', date: parseDate(r[cm.date]), pname: r[cm.pname]||'', pimg: r[cm.pimg]||'', cost: parseFloat(r[cm.cost])||0, gmv: parseFloat(r[cm.gmv])||0, roi: parseFloat(r[cm.roi])||0 })).filter(r => r.date && r.pid);

  var grouped = {};
  cleaned.forEach(r => { var key = r.pid+'|'+r.date; if (!grouped[key]) grouped[key] = { pid:r.pid, date:r.date, pname:r.pname, pimg:r.pimg, cost:0, gmv:0 }; grouped[key].cost+=r.cost; grouped[key].gmv+=r.gmv; });
  var daily = Object.values(grouped).sort((a,b) => String(a.pid).localeCompare(String(b.pid)) || a.date.localeCompare(b.date));

  var byProduct = {}, alerts = [], allDaily = {}, dates = new Set();
  daily.forEach(r => { if (!byProduct[r.pid]) byProduct[r.pid] = []; byProduct[r.pid].push(r); });

  Object.entries(byProduct).forEach(([pid, items]) => {
    items.sort((a,b) => a.date.localeCompare(b.date));
    allDaily[pid] = [];
    items.forEach((item, idx) => {
      dates.add(item.date);
      var prev = idx > 0 ? items[idx-1] : null;
      var pct = (prev && prev.cost > 0) ? (item.cost-prev.cost)/prev.cost*100 : null;
      allDaily[pid].push({ date: item.date, cost: round(item.cost), gmv: round(item.gmv), roi: 0 });
      if (idx === items.length-1 && prev && pct !== null && pct < -20) alerts.push({ product_id: pid, product_name: item.pname, product_img: item.pimg, current_cost: round(item.cost), prev_cost: round(prev.cost), change_pct: round(pct) });
    });
  });

  var ds = {};
  cleaned.forEach(r => { if (!ds[r.date]) ds[r.date] = { date:r.date, cost:0, gmv:0 }; ds[r.date].cost+=r.cost; ds[r.date].gmv+=r.gmv; });
  var dsl = Object.values(ds).sort((a,b) => a.date.localeCompare(b.date)).map(d => ({ date:d.date, cost:round(d.cost), gmv:round(d.gmv), roi: d.cost>0?round(d.gmv/d.cost):0 }));

  var ps = {};
  daily.forEach(r => { if (!ps[r.pid]) ps[r.pid] = { pid:r.pid, pname:r.pname, pimg:r.pimg, cost:0, gmv:0 }; ps[r.pid].cost+=r.cost; ps[r.pid].gmv+=r.gmv; });
  var psl = Object.values(ps).map(p => ({ product_id:p.pid, product_name:p.pname, product_img:p.pimg, total_cost:round(p.cost), total_gmv:round(p.gmv), roi: p.cost>0?round(p.gmv/p.cost):0 })).sort((a,b) => b.total_cost-a.total_cost);

  var tc = round(daily.reduce((s,d) => s+d.cost,0)), tg = round(daily.reduce((s,d) => s+d.gmv,0));
  var sd = Array.from(dates).sort();

  // Recalculate ROI in allDaily
  cleaned.forEach(r => {
    var items = allDaily[r.pid];
    if (items) items.forEach(d => { if (d.date === r.date) d.roi = round(r.gmv > 0 && r.cost > 0 ? r.gmv/r.cost : 0); });
  });

  return {
    meta: { generated_at: new Date().toLocaleString('zh-CN'), date_range: sd[0]+' ~ '+sd[sd.length-1], total_cost: tc, total_gmv: tg, total_roi: tc>0?round(tg/tc):0, num_products: Object.keys(byProduct).length, num_days: sd.length, latest_date: sd[sd.length-1]||'', prev_date: sd[sd.length-2]||'', shop_name: shopName },
    alerts: alerts.sort((a,b) => a.change_pct-b.change_pct),
    daily_summary: dsl,
    product_summary: psl,
    all_product_daily: allDaily
  };
}

// 初始化
if (typeof ALL_SHOP_DATA !== 'undefined' && Object.keys(ALL_SHOP_DATA).length > 1) {
  allShopData = ALL_SHOP_DATA;
  loadData(mergeShopData(allShopData));
} else {
  loadData(BUILT_IN_DATA);
}
</script>
